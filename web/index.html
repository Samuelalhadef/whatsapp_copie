<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ======================= ÉCRAN DE CONNEXION ======================= -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 90 90" width="64" height="64" fill="#25D366">
          <path d="M45 0C20.1 0 0 20.1 0 45c0 7.9 2.1 15.6 6 22.4L0 90l23.2-6.1C29.7 87.6 37.2 90 45 90c24.9 0 45-20.1 45-45S69.9 0 45 0zm0 82c-7 0-13.8-1.9-19.8-5.4l-1.4-.8-14.7 3.9 3.9-14.3-.9-1.5C8.8 57.9 7 51.6 7 45 7 24 24 7 45 7s38 17 38 38-17 37-38 37z"/>
          <path d="M67.4 55.5c-1.2-.6-7-3.4-8-3.8-1.1-.4-1.9-.6-2.6.6-.8 1.2-3 3.8-3.7 4.6-.7.8-1.4.9-2.5.3-1.2-.6-5-1.8-9.5-5.9-3.5-3.1-5.9-7-6.6-8.2-.7-1.2-.1-1.8.5-2.4.5-.5 1.2-1.4 1.8-2.1.6-.7.8-1.2 1.2-2 .4-.8.2-1.5-.1-2.1-.3-.6-2.6-6.4-3.6-8.7-1-2.3-1.9-2-2.6-2-.7 0-1.5-.1-2.3-.1-.8 0-2.1.3-3.2 1.5-1.1 1.2-4.2 4.1-4.2 10s4.3 11.6 4.9 12.4c.6.8 8.5 13 20.5 18.2 2.9 1.2 5.1 2 6.8 2.6 2.9 0.9 5.5 0.8 7.6 0.5 2.3-.3 7-2.9 8-5.6 1-2.7 1-5.1.7-5.6-.3-.5-1.1-.8-2.3-1.4z"/>
        </svg>
      </div>
      <h1>WhatsApp</h1>
      <p>Entre ton nom pour rejoindre la discussion</p>
      <form id="login-form" autocomplete="off">
        <input id="name-input" type="text" placeholder="Ton nom…" maxlength="24" required />
        <button type="submit">Rejoindre</button>
      </form>
      <div class="login-status" id="login-status"></div>
    </div>
  </div>

  <!-- ============================ APPLICATION ============================ -->
  <div id="app" class="app hidden">

    <!-- ---------- PANNEAU LATÉRAL GAUCHE (liste des discussions) ---------- -->
    <div class="sidebar">
      <header class="sidebar-header">
        <div class="me">
          <div class="avatar" id="my-avatar">M</div>
          <div class="me-info">
            <span class="me-name" id="my-name">—</span>
            <span class="role-badge" id="my-role">user</span>
          </div>
        </div>
        <div class="sidebar-header-icons">
          <button id="new-room-btn" title="Créer un salon" aria-label="Créer un salon">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.005 3.175H4.674C3.642 3.175 3 3.789 3 4.821V21.02l3.544-3.514h12.461c1.033 0 2.064-1.06 2.064-2.093V4.821c-.001-1.032-1.032-1.646-2.064-1.646zm-4.989 9.869H7.041V11.1h6.975v1.944zm3-4H7.041V7.1h9.975v1.944z"/></svg>
          </button>
          <button id="help-btn" title="Aide (commandes)" aria-label="Aide">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 7a2 2 0 1 0-2-2 2 2 0 0 0 2 2zm0 2a2 2 0 1 0 2 2 2 2 0 0 0-2-2zm0 6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"/></svg>
          </button>
        </div>
      </header>

      <div class="search-bar">
        <div class="search-input">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.009 13.805h-.636l-.22-.219a5.184 5.184 0 0 0 1.256-3.386 5.207 5.207 0 1 0-5.207 5.208 5.183 5.183 0 0 0 3.385-1.255l.221.22v.635l4.004 3.999 1.194-1.195-3.997-4.007zm-4.808 0a3.605 3.605 0 1 1 0-7.21 3.605 3.605 0 0 1 0 7.21z"/></svg>
          <input type="text" id="chat-search" placeholder="Rechercher ou démarrer une discussion" />
        </div>
      </div>

      <div class="section-label">Salons</div>
      <div class="chat-list" id="rooms-list">
        <!-- rempli dynamiquement par app.js -->
      </div>
    </div>

    <!-- ---------- PANNEAU DE CONVERSATION DE DROITE ---------- -->
    <div class="conversation">
      <header class="conv-header">
        <div class="avatar group-avatar">
          <svg viewBox="0 0 24 24" width="26" height="26"><path fill="#fff" d="M12 12.75c1.63 0 3.07.39 4.24.9 1.08.48 1.76 1.56 1.76 2.73V18H6v-1.61c0-1.18.68-2.26 1.76-2.73 1.17-.52 2.61-.91 4.24-.91zM4 13c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm1.13 1.1c-.37-.06-.74-.1-1.13-.1-.99 0-1.93.21-2.78.58C.48 14.9 0 15.62 0 16.43V18h4.5v-1.61c0-.83.23-1.61.63-2.29zM20 13c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm4 3.43c0-.81-.48-1.53-1.22-1.85-.85-.37-1.79-.58-2.78-.58-.39 0-.76.04-1.13.1.4.68.63 1.46.63 2.29V18H24v-1.57zM12 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3z"/></svg>
        </div>
        <div class="conv-header-info">
          <span class="conv-title" id="conv-room-name"># general</span>
          <span class="conv-subtitle" id="conv-subtitle">participants…</span>
        </div>
        <div class="conv-header-icons">
          <button title="Rechercher" aria-label="Rechercher">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M15.009 13.805h-.636l-.22-.219a5.184 5.184 0 0 0 1.256-3.386 5.207 5.207 0 1 0-5.207 5.208 5.183 5.183 0 0 0 3.385-1.255l.221.22v.635l4.004 3.999 1.194-1.195-3.997-4.007zm-4.808 0a3.605 3.605 0 1 1 0-7.21 3.605 3.605 0 0 1 0 7.21z"/></svg>
          </button>
          <button title="Menu" aria-label="Menu">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 7a2 2 0 1 0-2-2 2 2 0 0 0 2 2zm0 2a2 2 0 1 0 2 2 2 2 0 0 0-2-2zm0 6a2 2 0 1 0 2 2 2 2 0 0 0-2-2z"/></svg>
          </button>
        </div>
      </header>

      <div class="messages" id="messages">
        <div class="date-chip"><span>Aujourd'hui</span></div>
        <div class="encryption-note">
          <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:-2px"><path fill="currentColor" d="M12 1.75A4.25 4.25 0 0 0 7.75 6v2H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-.75V6A4.25 4.25 0 0 0 12 1.75zm2.25 6.25h-4.5V6a2.25 2.25 0 0 1 4.5 0z"/></svg>
          Les messages sont chiffrés de bout en bout. Personne en dehors de cette discussion ne peut les lire.
        </div>
      </div>

      <footer class="conv-footer">
        <button class="footer-icon" title="Emoji" aria-label="Emoji">
          <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M9.153 11.603c.795 0 1.44-.88 1.44-1.962s-.645-1.96-1.44-1.96-1.44.88-1.44 1.96.645 1.965 1.44 1.965zM5.95 12.965c-.026-.307-.131 5.218 6.063 5.323 6.066-.105 6.078-5.622 6.052-5.323H5.95zm10.226 0c-.129.687-.98 1.964-3.037 1.964H12.1c-2.05 0-2.907-1.284-3.03-1.964H16.176zM14.847 11.603c.795 0 1.44-.88 1.44-1.962s-.645-1.96-1.44-1.96-1.44.88-1.44 1.96.645 1.965 1.44 1.965zM12 20.5A8.5 8.5 0 1 1 20.5 12 8.51 8.51 0 0 1 12 20.5zm0-18.75A10.25 10.25 0 1 0 22.25 12 10.26 10.26 0 0 0 12 1.75z"/></svg>
        </button>
        <button class="footer-icon" title="Joindre" aria-label="Joindre">
          <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M1.816 15.556v.002c0 1.502.584 2.912 1.646 3.972s2.472 1.647 3.974 1.647a5.58 5.58 0 0 0 3.972-1.645l9.547-9.548c.769-.768 1.147-1.767 1.058-2.817-.079-.968-.548-1.927-1.319-2.698-1.594-1.592-4.068-1.711-5.517-.262l-7.916 7.915c-.881.881-.792 2.25.214 3.261.959.958 2.423 1.053 3.263.215l5.511-5.512c.28-.28.267-.722.053-.936l-.244-.244c-.191-.191-.567-.349-.957.04l-5.506 5.506c-.18.18-.635.127-.976-.214-.098-.097-.576-.613-.213-.973l7.915-7.917c.818-.817 2.267-.699 3.23.262.5.501.802 1.1.849 1.685.051.573-.156 1.111-.589 1.543l-9.547 9.549a3.97 3.97 0 0 1-2.829 1.171 3.975 3.975 0 0 1-2.83-1.173 3.973 3.973 0 0 1-1.172-2.828c0-1.071.415-2.076 1.172-2.83l7.209-7.211c.157-.157.264-.579.028-.814L11.5 4.36a.572.572 0 0 0-.834.018l-7.205 7.207a5.577 5.577 0 0 0-1.645 3.971z"/></svg>
        </button>
        <form id="msg-form" class="msg-form" autocomplete="off">
          <input id="msg-input" type="text" placeholder="Tapez un message ou une commande (/help)" />
        </form>
        <button class="footer-icon send-icon" id="send-btn" title="Envoyer" aria-label="Envoyer">
          <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M1.101 21.757 23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"/></svg>
        </button>
      </footer>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
